.submit-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.summary-box{background:var(--bg-dark);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px;font-size:0.83rem}
.summary-label{font-weight:600;color:var(--brand-primary);margin-bottom:8px;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.5px}
.summary-content{color:var(--text-secondary);line-height:1.8}
.success-message{text-align:center;padding:30px 20px;animation:fadeInUp 0.4s ease}
.success-message .check-icon{font-size:3rem;margin-bottom:12px}
.success-message h3{color:var(--accent-green);margin-bottom:8px}
.success-message p{color:var(--text-secondary);font-size:0.9rem}
.powered-by{text-align:center;padding:30px 0 10px;font-size:0.75rem;color:var(--text-muted)}
.powered-by a{color:var(--brand-primary);text-decoration:none;font-weight:600}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="container" id="app"></div>
<div class="spec-overlay" id="specOverlay" onclick="if(event.target===this)closeSpec()">
  <div class="spec-sheet">
    <div class="spec-handle"></div>
    <div class="spec-header">
      <h3>Your Job Spec</h3>
      <button class="spec-close" onclick="closeSpec()">&#x2715;</button>
    </div>
    <p class="spec-intro">Copy this and send it to any tradie you want a quote from. No prices — just the job details.</p>
    <div class="spec-box" id="specContent"></div>
    <div class="spec-actions">
      <button class="spec-action-btn spec-copy" onclick="copySpec(this)">&#x1F4CB; Copy to clipboard</button>
      <a class="spec-action-btn spec-wa" id="specWA" href="#" target="_blank">&#x1F4F2; Share via WhatsApp</a>
    </div>
    <div class="spec-brand">Created with <a href="https://itabs.ai" target="_blank">iTabs</a> &middot; Free trade spec builder</div>
  </div>
</div>
<script>
var C = WIDGET_CONFIG;
var state = { answers: {}, sliders: {}, toggles: {}, openSection: null, completedSections: new Set() };

function init() {
  var b = C.branding, r = document.documentElement.style;
  r.setProperty('--bg-main', b.backgroundColor); r.setProperty('--bg-card', b.cardBackground); r.setProperty('--bg-hover', b.hoverBackground); r.setProperty('--bg-dark', b.darkBackground); r.setProperty('--border', b.borderColor); r.setProperty('--brand-primary', b.primaryColor); r.setProperty('--brand-secondary', b.secondaryColor); r.setProperty('--brand-glow', 'rgba(99,102,241,0.15)'); r.setProperty('--text-primary', b.textColor); r.setProperty('--text-secondary', b.mutedText); r.setProperty('--text-muted', b.dimText); r.setProperty('--accent-green', b.successColor); r.setProperty('--accent-red', b.errorColor); r.setProperty('--accent-blue', b.infoColor); r.setProperty('--font-main', b.fontFamily); r.setProperty('--font-mono', b.monoFont); r.setProperty('--radius', b.borderRadius);
  renderApp(); updateEstimate(); updateProgress();
}

function renderApp() {
  var app = document.getElementById('app');
  var h = C.header;
  var total = C.steps.length + 2;
  var html = '<div class="header"><div class="header-icon">' + h.icon + '</div><h1>' + h.headline + '</h1><p>' + h.subtitle + '</p><span class="badge-line">' + h.badge + '</span></div>';
  html += '<div class="progress-label"><span>Progress</span><span id="progressText">0 of ' + total + '</span></div><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>';
  C.steps.forEach(function(step, i) { html += renderSection(step, i); });
  html += renderEstimateSection(C.steps.length);
  html += renderLeadSection(C.steps.length + 1);
  if (C.footer && C.footer.showPoweredBy) html += '<div class="powered-by">Powered by <a href="' + C.footer.poweredByUrl + '" target="_blank">iTabs</a> &middot; Interactive tools that convert</div>';
  app.innerHTML = html;
}

function renderSection(step, i) {
  var sid = 'section-' + i;
  var inputLabel = step.input.type === 'toggle_group' ? 'Add Extras' : 'Choose';
  var hints = step.hints || [];
  var tabsHtml = '';
  if (hints.length) {
    tabsHtml = '<div class="tabs"><button class="tab active" onclick="showTab(this,\'' + sid + '-input\')">' + inputLabel + '</button>';
    hints.forEach(function(h, hi) { tabsHtml += '<button class="tab" onclick="showTab(this,\'' + sid + '-hint-' + hi + '\')">' + h.tabLabel + '</button>'; });
    tabsHtml += '</div>';
  }
  var contentHtml = tabsHtml + '<div class="tab-panel show" id="' + sid + '-input">' + renderInput(step) + '</div>';
  hints.forEach(function(hint, hi) { contentHtml += '<div class="tab-panel" id="' + sid + '-hint-' + hi + '">' + renderHint(hint) + '</div>'; });
  return '<div class="itab-section" id="' + sid + '"><div class="itab-header" onclick="toggleSection(' + i + ')"><div class="itab-title"><span class="itab-number">' + (i+1) + '</span><div><div class="itab-name">' + step.title + '</div><div class="itab-preview" id="' + sid + '-preview">' + step.preview + '</div></div></div><button class="i-button" id="' + sid + '-btn">i</button></div><div class="itab-content" id="' + sid + '-content">' + contentHtml + '</div></div>';
}

function renderEstimateSection(i) {
  var sid = 'section-' + i;
  return '<div class="itab-section" id="' + sid + '"><div class="itab-header" onclick="toggleSection(' + i + ')"><div class="itab-title"><span class="itab-number">' + (i+1) + '</span><div><div class="itab-name">' + C.estimate.title + '</div><div class="itab-preview" id="' + sid + '-preview">' + C.estimate.preview + '</div></div></div><button class="i-button" id="' + sid + '-btn">i</button></div><div class="itab-content" id="' + sid + '-content"><div class="estimate-box"><div class="est-label">Estimated range</div><div class="est-range" id="estRange">-</div><div class="est-note" id="estNote">Complete the sections above to see your estimate</div><div class="estimate-breakdown" id="estBreakdown"></div></div><button class="spec-btn" id="specBtn" onclick="openSpec()">&#x1F4CB; Create My Spec — share with any tradie</button></div></div>';
}

function renderLeadSection(i) {
  var sid = 'section-' + i;
  var lc = C.leadCapture;
  var fields = lc.fields.map(function(f) {
    var req = f.required ? ' *' : '';
    return f.type === 'textarea'
      ? '<div class="form-group"><label>' + f.label + req + '</label><textarea id="form-' + f.id + '" placeholder="' + f.placeholder + '"></textarea></div>'
      : '<div class="form-group"><label>' + f.label + req + '</label><input type="text" id="form-' + f.id + '" placeholder="' + f.placeholder + '"></div>';
  }).join('');
  return '<div class="itab-section" id="' + sid + '"><div class="itab-header" onclick="toggleSection(' + i + ')"><div class="itab-title"><span class="itab-number">' + (i+1) + '</span><div><div class="itab-name">' + lc.title + '</div><div class="itab-preview" id="' + sid + '-preview">' + lc.preview + '</div></div></div><button class="i-button" id="' + sid + '-btn">i</button></div><div class="itab-content" id="' + sid + '-content"><div id="leadForm"><p style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:16px">' + lc.subheading + '</p><div class="summary-box"><div class="summary-label">Your specs</div><div class="summary-content" id="quoteSummary">Select your options above first</div></div>' + fields + '<button class="submit-btn" id="submitBtn" onclick="submitLead()">' + lc.submitText + '</button><div style="text-align:center;margin-top:12px;font-size:0.75rem;color:var(--text-muted)">' + lc.submitNote + '</div></div><div class="success-message" id="successMsg" style="display:none"><div class="check-icon">&#x2705;</div><h3>' + lc.successMessage + '</h3><p>' + lc.successSubtext + '</p></div></div></div>';
}

function renderInput(step) {
  if (step.input.type === 'select') {
    var cols = step.input.columns || 1;
    var html = '<div class="option-grid' + (cols > 1 ? ' cols-' + cols : '') + '">';
    var idx = C.steps.indexOf(step);
    step.input.options.forEach(function(opt) {
      var sel = state.answers[step.id] === opt.value ? ' selected' : '';
      var tags = (opt.tags||[]).map(function(t){return '<span class="option-tag'+(t.highlight?' highlight':'')+'">'+ t.text+'</span>';}).join('');
      html += '<div class="option-card'+sel+'" onclick="selectOption(\''+step.id+'\',\''+opt.value+'\','+idx+','+(step.input.autoAdvance||false)+')"><div class="option-top"><span class="option-name">'+opt.icon+' '+opt.label+'</span>'+(opt.priceHint?'<span class="option-price">'+opt.priceHint+'</span>':'')+'</div>'+(opt.description?'<div class="option-desc">'+opt.description+'</div>':'')+(tags?'<div class="option-tags">'+tags+'</div>':'')+'<span class="option-check">&#x2713; Selected</span></div>';
    });
    return html + '</div>';
  }
  if (step.input.type === 'toggle_group') {
    var idx2 = C.steps.indexOf(step);
    return step.input.toggles.map(function(t){
      var on = state.toggles[t.id] ? ' on' : '';
      return '<div class="toggle-row"><div class="toggle-info"><div class="toggle-name">'+t.icon+' '+t.label+'</div><div class="toggle-cost">'+t.costHint+'</div></div><div class="toggle-switch'+on+'" id="toggle-'+t.id+'" onclick="toggleExtra(\''+t.id+'\',\''+step.id+'\','+idx2+')"><div class="toggle-knob"></div></div></div>';
    }).join('');
  }
  return '';
}

function renderHint(hint) {
  if (hint.type === 'comparison_table') {
    var html = '<table class="compare-table"><thead><tr>'+hint.columns.map(function(c){return '<th>'+c+'</th>';}).join('')+'</tr></thead><tbody>';
    hint.rows.forEach(function(row){ html+='<tr>'+row.map(function(cell){var cls=hint.cellStyles&&hint.cellStyles[cell]?' class="'+hint.cellStyles[cell]+'"':'';return '<td'+cls+'>'+cell+'</td>';}).join('')+'</tr>'; });
    return html+'</tbody></table>';
  }
  if (hint.type === 'tips') return hint.tips.map(function(t){return '<div class="tip-card"><div class="tip-title">'+t.icon+' '+t.title+'</div><p>'+t.text+'</p></div>';}).join('');
  return '';
}

function toggleSection(i) {
  var sid = 'section-' + i;
  var content = document.getElementById(sid + '-content');
  var btn = document.getElementById(sid + '-btn');
  var isOpen = content.classList.contains('show');
  document.querySelectorAll('.itab-content').forEach(function(c){c.classList.remove('show');});
  document.querySelectorAll('.i-button').forEach(function(b){b.classList.remove('active');});
  if (!isOpen) {
    content.classList.add('show'); btn.classList.add('active'); state.openSection = sid;
    state.completedSections.add(sid); updateProgress();
    setTimeout(function(){ document.getElementById(sid).scrollIntoView({behavior:'smooth',block:'start'}); }, 100);
  } else { state.openSection = null; }
}

function showTab(btn, panelId) {
  var container = btn.closest('.itab-content');
  container.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  container.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('show');});
  btn.classList.add('active'); document.getElementById(panelId).classList.add('show');
}

function selectOption(stepId, value, idx, autoAdvance) {
  state.answers[stepId] = value;
  var sid = 'section-' + idx;
  var step = C.steps[idx];
  document.querySelectorAll('#' + sid + '-input .option-card').forEach(function(card, i){ card.classList.toggle('selected', step.input.options[i] && step.input.options[i].value === value); });
  document.getElementById(sid).classList.add('completed'); state.completedSections.add(sid);
  var opt = step.input.options.find(function(o){return o.value===value;});
  document.getElementById(sid+'-preview').innerHTML='<span class="selected">&#x2713; '+(opt?opt.label:value)+'</span>';
  updateEstimate(); updateQuoteSummary(); updateProgress();
  if (autoAdvance) setTimeout(function(){ toggleSection(idx+1); }, 400);
}

function toggleExtra(toggleId, stepId, idx) {
  state.toggles[toggleId] = !state.toggles[toggleId];
  document.getElementById('toggle-'+toggleId).classList.toggle('on');
  var sid = 'section-'+idx;
  var step = C.steps[idx];
  var active = step.input.toggles.filter(function(t){return state.toggles[t.id];});
  if (active.length) {
    document.getElementById(sid+'-preview').innerHTML='<span class="selected">&#x2713; '+active.length+' extra'+(active.length>1?'s':'')+' added</span>';
    document.getElementById(sid).classList.add('completed'); state.completedSections.add(sid);
  } else {
    document.getElementById(sid+'-preview').textContent=step.preview;
    document.getElementById(sid).classList.remove('completed'); state.completedSections.delete(sid);
  }
  updateEstimate(); updateQuoteSummary(); updateProgress();
}

function calculateEstimate() {
  var p = C.pricing;
  var primary = state.answers[p.basePriceStep];
  if (!primary || !p.basePrices[primary]) return null;
  var base = p.basePrices[primary];
  var low = base.low, high = base.high;
  if (p.multipliers) p.multipliers.forEach(function(m){
    if (m.type==='select_map'){var a=state.answers[m.source];if(a&&m.values[a]!==undefined){low*=m.values[a];high*=m.values[a];}}
  });
  low=Math.round(low); high=Math.round(high);
  var breakdown = [];
  var ps = C.steps.find(function(s){return s.id===p.basePriceStep;});
  var po = ps?ps.input.options.find(function(o){return o.value===primary;}):null;
  breakdown.push({label:(po?po.label:primary),low:Math.round(base.low*(state.answers['home_size']?C.pricing.multipliers[0].values[state.answers['home_size']]:1)*(state.answers['surface_condition']?C.pricing.multipliers[1].values[state.answers['surface_condition']]:1)*(state.answers['paint_quality']?C.pricing.multipliers[2].values[state.answers['paint_quality']]:1)),high:Math.round(base.high*(state.answers['home_size']?C.pricing.multipliers[0].values[state.answers['home_size']]:1)*(state.answers['surface_condition']?C.pricing.multipliers[1].values[state.answers['surface_condition']]:1)*(state.answers['paint_quality']?C.pricing.multipliers[2].values[state.answers['paint_quality']]:1))});
  if (p.extras) p.extras.forEach(function(extra){
    if(!state.toggles[extra.id]) return;
    low+=extra.low; high+=extra.high; breakdown.push({label:extra.breakdownLabel,low:extra.low,high:extra.high});
  });
  if (p.minimumPrice){low=Math.max(low,p.minimumPrice);high=Math.max(high,p.minimumPrice);}
  if (p.roundTo){low=Math.round(low/p.roundTo)*p.roundTo;high=Math.round(high/p.roundTo)*p.roundTo;}
  return {low:low,high:high,breakdown:breakdown};
}

function updateEstimate() {
  var est = calculateEstimate();
  var rangeEl=document.getElementById('estRange'), noteEl=document.getElementById('estNote'), breakdownEl=document.getElementById('estBreakdown');
  var previewEl=document.getElementById('section-'+C.steps.length+'-preview'), specBtn=document.getElementById('specBtn');
  if(!rangeEl) return;
  if(!est){rangeEl.textContent='-';noteEl.textContent='Complete the sections above to see your estimate';breakdownEl.innerHTML='';if(previewEl)previewEl.textContent=C.estimate.preview;if(specBtn)specBtn.classList.remove('visible');return;}
  var rt='$'+est.low.toLocaleString('en-AU')+' - $'+est.high.toLocaleString('en-AU');
  rangeEl.textContent=rt; noteEl.textContent=C.estimate.note;
  if(C.pricing.showBreakdown&&est.breakdown) breakdownEl.innerHTML=est.breakdown.map(function(b){return '<div class="breakdown-row"><span class="br-label">'+b.label+'</span><span class="br-value">$'+b.low.toLocaleString('en-AU')+' - $'+b.high.toLocaleString('en-AU')+'</span></div>';}).join('');
  if(previewEl) previewEl.innerHTML='<span class="selected">&#x2713; '+rt+'</span>';
  if(specBtn) specBtn.classList.add('visible');
}

function updateQuoteSummary() {
  var el=document.getElementById('quoteSummary'); if(!el) return;
  var lines=[];
  C.steps.forEach(function(step){
    if(step.input.type==='select'&&state.answers[step.id]){var opt=step.input.options.find(function(o){return o.value===state.answers[step.id];});lines.push(step.title+': '+(opt?opt.label:state.answers[step.id]));}
    if(step.input.type==='toggle_group'){var active=step.input.toggles.filter(function(t){return state.toggles[t.id];});if(active.length)lines.push('Extras: '+active.map(function(t){return t.label;}).join(', '));}
  });
  el.innerHTML=lines.length?lines.join('<br>'):'Select your options above first';
}

function updateProgress() {
  var total=C.steps.length+2, done=state.completedSections.size, pct=(done/total)*100;
  var fill=document.getElementById('progressFill'), text=document.getElementById('progressText');
  if(fill)fill.style.width=pct+'%'; if(text)text.textContent=done+' of '+total;
}

function buildSpecText() {
  var lines=['QUOTE REQUEST — PAINTING','','Trade: House Painting','Location: Perth, WA',''];
  C.steps.forEach(function(step){
    if(step.input.type==='select'&&state.answers[step.id]){var opt=step.input.options.find(function(o){return o.value===state.answers[step.id];});lines.push(step.title+': '+(opt?opt.label:state.answers[step.id]));}
    if(step.input.type==='toggle_group'){var active=step.input.toggles.filter(function(t){return state.toggles[t.id];});if(active.length)lines.push('Extras: '+active.map(function(t){return t.label;}).join(', '));}
  });
  lines.push(''); lines.push('Created with iTabs (itabs.ai)');
  return lines.join('\n');
}

function openSpec() {
  var text=buildSpecText();
  document.getElementById('specContent').textContent=text;
  document.getElementById('specWA').href='https://wa.me/?text='+encodeURIComponent(text);
  document.getElementById('specOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeSpec() {
  document.getElementById('specOverlay').classList.remove('open');
  document.body.style.overflow='';
}

function copySpec(btn) {
  var text=document.getElementById('specContent').textContent;
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(function(){btn.textContent='Copied!';setTimeout(function(){btn.textContent='Copy to clipboard';},2000);});}
  else{var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);btn.textContent='Copied!';setTimeout(function(){btn.textContent='Copy to clipboard';},2000);}
}

async function submitLead() {
  var lc=C.leadCapture, formData={}, missing=false;
  lc.fields.forEach(function(f){var el=document.getElementById('form-'+f.id);var val=el?el.value.trim():'';formData[f.id]=val;if(f.required&&!val)missing=true;});
  if(missing){alert('Please fill in the required fields');return;}
  var btn=document.getElementById('submitBtn');btn.textContent='Sending...';btn.disabled=true;
  var summary='';
  C.steps.forEach(function(step){
    if(step.input.type==='select'&&state.answers[step.id]){var opt=step.input.options.find(function(o){return o.value===state.answers[step.id];});summary+=(step.title+': '+(opt?opt.label:state.answers[step.id])+'\n');}
    if(step.input.type==='toggle_group'){var active=step.input.toggles.filter(function(t){return state.toggles[t.id];});if(active.length)summary+=('Extras: '+active.map(function(t){return t.label;}).join(', ')+'\n');}
  });
  try{var payload=Object.assign({access_key:lc.delivery.web3formsKey,subject:lc.delivery.emailSubject,from_name:C.business.name,message:'NEW ENQUIRY\n\n'+Object.entries(formData).map(function(e){return e[0]+': '+e[1];}).join('\n')+'\n\nSELECTIONS\n'+summary},formData);await fetch('https://api.web3forms.com/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});}catch(e){console.error(e);}
  document.getElementById('leadForm').style.display='none';
  document.getElementById('successMsg').style.display='block';
  var sid='section-'+(C.steps.length+1);
  document.getElementById(sid).classList.add('completed');state.completedSections.add(sid);
  document.getElementById(sid+'-preview').innerHTML='<span class="selected">&#x2713; Sent!</span>';
  updateProgress();
}

init();
</script>
</body>
</html>
